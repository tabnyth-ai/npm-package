<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 88" role="img" aria-labelledby="title desc">
  <title id="title">Tabnyth Studio logo</title>
  <desc id="desc">Tabnyth Studio wordmark with a cyan database-table monogram.</desc>
  <defs>
    <linearGradient id="cyan-fill" x1="14" y1="11" x2="74" y2="77" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8EFFFF" />
      <stop offset="0.52" stop-color="#22D3EE" />
      <stop offset="1" stop-color="#0891B2" />
    </linearGradient>
    <linearGradient id="word-fill" x1="96" y1="24" x2="326" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E9FFFF" />
      <stop offset="0.64" stop-color="#67E8F9" />
      <stop offset="1" stop-color="#22D3EE" />
    </linearGradient>
    <filter id="soft-glow" x="-24%" y="-24%" width="148%" height="148%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.6" result="blur" />
      <feFlood flood-color="#22D3EE" flood-opacity="0.38" />
      <feComposite in2="blur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#soft-glow)">
    <rect x="4" y="4" width="80" height="80" rx="18" fill="#05131A" />
    <path
      fill="url(#cyan-fill)"
      d="M18 24c0-4.42 3.58-8 8-8h36c4.42 0 8 3.58 8 8v40c0 4.42-3.58 8-8 8H26c-4.42 0-8-3.58-8-8V24Zm10 1v9h32v-9H28Zm0 17v20h11V42H28Zm21 0v20h11V42H49Z"
    />
    <path fill="#D9FFFF" d="M27 25h34v10H47v29h-7V35H27V25Z" opacity="0.96" />
  </g>
  <text
    x="104"
    y="51"
    fill="url(#word-fill)"
    font-family="Geist, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    font-size="32"
    font-weight="800"
    letter-spacing="0"
  >
    Tabnyth
  </text>
  <text
    x="105"
    y="70"
    fill="#A7F3FF"
    font-family="Geist, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
    font-size="14"
    font-weight="700"
    letter-spacing="3"
    opacity="0.8"
  >
    STUDIO
  </text>
</svg>
